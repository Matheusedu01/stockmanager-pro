# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/stockmanager?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:stockmanager}
spring.datasource.password=${DB_PASSWORD:Stock@Manager123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Server
server.port=${PORT:8080}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true